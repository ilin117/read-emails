<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Auto Reader</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="app-shell">
        <h1>Gmail Auto Reader</h1>
        <p>Click the button below to mark unread Gmail messages as read.</p>
        <button id="markReadBtn">Mark unread emails as read</button>
        <div id="status" class="status">Ready.</div>
        <div class="info">
            <p>Note: the backend will use your existing <code>credentials.json</code> and <code>token.pickle</code> for
                OAuth.</p>
        </div>
    </div>


</body>

</html>
